<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #525659;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px;
      background: #383838;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      flex-wrap: wrap;
    }

    #toolbar button {
      background: #4a4a4a;
      border: 1px solid #666;
      color: #fff;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.4;
    }

    #toolbar button:hover:not(:disabled) { background: #5e5e5e; }
    #toolbar button:disabled { opacity: 0.35; cursor: default; }

    #page-info {
      font-size: 14px;
      min-width: 90px;
      text-align: center;
      white-space: nowrap;
    }

    #zoom-level {
      font-size: 14px;
      min-width: 50px;
      text-align: center;
    }

    .toolbar-divider {
      width: 1px;
      height: 22px;
      background: #666;
      flex-shrink: 0;
    }

    #canvas-container {
      display: flex;
      justify-content: center;
      padding: 24px 16px;
      min-height: calc(100vh - 52px);
    }

    #pdf-canvas {
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      max-width: 100%;
      height: auto;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #525659;
      font-size: 17px;
      z-index: 100;
    }

    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #525659;
      font-size: 16px;
      color: #f88;
      z-index: 100;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>

  <div id="loading">Loading document…</div>
  <div id="error-msg"></div>

  <div id="toolbar">
    <button id="btn-prev">&larr; Prev</button>
    <span id="page-info">— / —</span>
    <button id="btn-next">Next &rarr;</button>
    <span class="toolbar-divider"></span>
    <button id="btn-zoom-out" aria-label="Zoom out">&#8722;</button>
    <span id="zoom-level">150%</span>
    <button id="btn-zoom-in" aria-label="Zoom in">&#43;</button>
  </div>

  <div id="canvas-container">
    <canvas id="pdf-canvas"></canvas>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const pdfUrl = '{{ page.pdf | relative_url }}';
    const canvas  = document.getElementById('pdf-canvas');
    const ctx     = canvas.getContext('2d');

    let pdfDoc      = null;
    let currentPage = 1;
    let scale       = 1.5;
    let renderTask  = null;

    function updateToolbar() {
      document.getElementById('page-info').textContent =
        `${currentPage} / ${pdfDoc.numPages}`;
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= pdfDoc.numPages;
      document.getElementById('zoom-level').textContent =
        `${Math.round(scale * 100)}%`;
    }

    async function renderPage(num) {
      if (renderTask) {
        try { renderTask.cancel(); } catch (_) {}
      }
      const page     = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale });
      canvas.width   = viewport.width;
      canvas.height  = viewport.height;
      renderTask = page.render({ canvasContext: ctx, viewport });
      try {
        await renderTask.promise;
      } catch (e) {
        if (e.name !== 'RenderingCancelledException') throw e;
        return;
      }
      updateToolbar();
      document.getElementById('canvas-container').scrollTop = 0;
      window.scrollTo({ top: 0 });
    }

    pdfjsLib.getDocument(pdfUrl).promise
      .then(doc => {
        pdfDoc = doc;
        document.getElementById('loading').style.display = 'none';
        renderPage(currentPage);
      })
      .catch(err => {
        const el = document.getElementById('error-msg');
        el.textContent = 'Could not load document: ' + err.message;
        el.style.display = 'flex';
        document.getElementById('loading').style.display = 'none';
      });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentPage > 1) renderPage(--currentPage);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (pdfDoc && currentPage < pdfDoc.numPages) renderPage(++currentPage);
    });

    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      scale = Math.min(scale + 0.25, 3.0);
      renderPage(currentPage);
    });

    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      scale = Math.max(scale - 0.25, 0.5);
      renderPage(currentPage);
    });

    document.addEventListener('keydown', e => {
      if (!pdfDoc) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') {
        if (currentPage < pdfDoc.numPages) renderPage(++currentPage);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
        if (currentPage > 1) renderPage(--currentPage);
      }
    });
  </script>
</body>
</html>
