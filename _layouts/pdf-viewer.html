<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #525659;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px;
      background: #383838;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    #toolbar button {
      background: #4a4a4a;
      border: 1px solid #666;
      color: #fff;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.4;
    }

    #toolbar button:hover:not(:disabled) { background: #5e5e5e; }
    #toolbar button:disabled { opacity: 0.35; cursor: default; }

    #zoom-level {
      font-size: 14px;
      min-width: 50px;
      text-align: center;
    }

    #progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.15);
      z-index: 100;
    }

    #progress-bar {
      height: 100%;
      background: #7eb8f7;
      width: 0%;
      transition: width 0.2s ease;
    }

    #pages-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 16px;
    }

    .page-wrapper {
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      line-height: 0; /* prevent gap under canvas */
    }

    .page-wrapper canvas {
      display: block;
    }

    /* Text layer: invisible to the eye, searchable and selectable by the browser */
    .textLayer {
      position: absolute;
      inset: 0;
      overflow: clip;
      line-height: 1;
      -webkit-user-select: text;
      user-select: text;
    }

    .textLayer span,
    .textLayer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }

    .textLayer ::selection {
      background: rgba(0, 100, 255, 0.3);
      color: transparent;
    }

    /* Browser find-in-page highlight */
    .textLayer ::-webkit-search-decoration,
    .textLayer mark {
      background: rgba(255, 200, 0, 0.5);
      color: transparent;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #525659;
      font-size: 16px;
      z-index: 50;
      transition: opacity 0.3s;
    }

    #loading-overlay.done {
      opacity: 0;
      pointer-events: none;
    }

    #error-msg {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #525659;
      font-size: 16px;
      color: #f88;
      z-index: 100;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>

  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="loading-overlay"><span id="loading-text">Loading document…</span></div>
  <div id="error-msg"></div>

  <div id="toolbar">
    <button id="btn-zoom-out" aria-label="Zoom out">&#8722;</button>
    <span id="zoom-level">100%</span>
    <button id="btn-zoom-in" aria-label="Zoom in">&#43;</button>
  </div>

  <div id="pages-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const pdfUrl   = '{{ page.pdf | relative_url }}';
    const container = document.getElementById('pages-container');
    const progressBar = document.getElementById('progress-bar');

    let pdfDoc     = null;
    let zoomFactor = 1.0; // relative to auto fit-width scale

    const dpr = window.devicePixelRatio || 1;

    function setProgress(n, total) {
      progressBar.style.width = `${Math.round((n / total) * 100)}%`;
    }

    // Compute a scale that fits the page width to the available container width.
    async function computeBaseScale() {
      const page         = await pdfDoc.getPage(1);
      const naturalWidth = page.getViewport({ scale: 1 }).width;
      const available    = container.clientWidth - 32; // 32px total side padding
      return Math.max(available / naturalWidth, 0.4);
    }

    async function renderAllPages() {
      container.innerHTML = '';

      const baseScale = await computeBaseScale();
      const scale     = baseScale * zoomFactor;

      document.getElementById('zoom-level').textContent =
        `${Math.round(zoomFactor * 100)}%`;

      for (let i = 1; i <= pdfDoc.numPages; i++) {
        const loadingText = document.getElementById('loading-text');
        if (loadingText) loadingText.textContent =
          `Rendering page ${i} of ${pdfDoc.numPages}…`;
        setProgress(i, pdfDoc.numPages);

        const page = await pdfDoc.getPage(i);

        // Render at device resolution for sharp text on retina/HiDPI screens
        const viewport    = page.getViewport({ scale: scale * dpr });
        const cssWidth    = viewport.width  / dpr;
        const cssHeight   = viewport.height / dpr;

        const wrapper = document.createElement('div');
        wrapper.className   = 'page-wrapper';
        wrapper.style.width  = cssWidth  + 'px';
        wrapper.style.height = cssHeight + 'px';

        // Canvas layer — native resolution, scaled down via CSS
        const canvas        = document.createElement('canvas');
        canvas.width        = viewport.width;
        canvas.height       = viewport.height;
        canvas.style.width  = cssWidth  + 'px';
        canvas.style.height = cssHeight + 'px';
        wrapper.appendChild(canvas);
        container.appendChild(wrapper);

        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

        // Text layer — positioned in CSS pixels so Ctrl+F and selection work
        const textViewport = page.getViewport({ scale });
        const textContent  = await page.getTextContent();
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        wrapper.appendChild(textLayerDiv);
        pdfjsLib.renderTextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: textViewport,
          textDivs: [],
        });
      }

      progressBar.style.width = '100%';
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('done');
        setTimeout(() => overlay.remove(), 400);
      }
    }

    pdfjsLib.getDocument(pdfUrl).promise
      .then(doc => {
        pdfDoc = doc;
        renderAllPages();
      })
      .catch(err => {
        const el = document.getElementById('error-msg');
        el.textContent = 'Could not load document: ' + err.message;
        el.style.display = 'flex';
        document.getElementById('loading-overlay').style.display = 'none';
      });

    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      zoomFactor = Math.min(zoomFactor + 0.2, 3.0);
      if (pdfDoc) renderAllPages();
    });

    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      zoomFactor = Math.max(zoomFactor - 0.2, 0.4);
      if (pdfDoc) renderAllPages();
    });

    // Re-fit to width when the window is resized (e.g. orientation change on mobile)
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (pdfDoc) renderAllPages(); }, 300);
    });
  </script>
</body>
</html>
